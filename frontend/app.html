<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>HamSafar — My Route</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        overflow: hidden;
        padding: 0;
        background: #000;
      }

      /* Layout */
      .layout {
        display: flex;
        height: 100vh;
        height: 100dvh;
        padding-top: var(--nav);
      }

      /* Map fills everything */
      #map {
        position: fixed;
        top: var(--nav);
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1;
      }

      /* Search bar — top left on map, below nav */
      .search-wrap {
        position: fixed;
        top: calc(var(--nav) + 10px);
        left: 10px;
        z-index: 50;
        width: calc(100% - 20px);
        max-width: 280px;
      }
      .search-inner {
        position: relative;
      }
      .search-ic {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
      }
      .search-field {
        width: 100%;
        padding: 10px 12px 10px 36px;
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--r);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        color: var(--text);
        outline: none;
        box-shadow: var(--shadow);
        transition: border-color 0.15s;
      }
      .search-field:focus {
        border-color: var(--green);
        box-shadow:
          0 0 0 3px var(--green-glow),
          var(--shadow);
      }
      .search-dd {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--r);
        margin-top: 4px;
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        max-height: 240px;
        overflow-y: auto;
        display: none;
      }
      .search-dd.show {
        display: block;
      }
      .search-item {
        padding: 10px 14px;
        cursor: pointer;
        border-bottom: 0.5px solid var(--border);
        transition: background 0.1s;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .search-item:last-child {
        border-bottom: none;
      }
      .search-item:active {
        background: var(--green-pale);
      }
      .si-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .si-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      /* Map controls — bottom right, above sheet */
      .map-controls {
        position: fixed;
        right: 12px;
        z-index: 50;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* Map hint pill */
      .map-hint {
        position: fixed;
        top: calc(var(--nav) + 58px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        background: rgba(13, 31, 20, 0.85);
        color: white;
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .map-hint.hidden {
        opacity: 0;
      }

      /* Map loading */
      .map-loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 60;
        background: var(--surface);
        border-radius: var(--rl);
        padding: 18px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow-lg);
        font-size: 14px;
        font-weight: 500;
        color: var(--text-mid);
        transition: opacity 0.2s;
      }
      .map-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* ── BOTTOM SHEET ──
   The key fix: sheet sits at bottom, scrollable inside,
   buttons are always visible above the fold */
      .sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: var(--surface);
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.12);
        border-top: 0.5px solid var(--border);
        /* height is dynamic — collapses when not drawing, expands when form shows */
        transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Pull handle */
      .sheet-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 10px auto 0;
        flex-shrink: 0;
      }

      /* Sheet scroll area — everything except handle scrolls */
      .sheet-scroll {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 16px 16px calc(16px + var(--safe-b));
      }

      /* Route status row at top of sheet */
      .route-status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .route-status-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        background: var(--green-pale);
        border: 1px solid var(--border);
        border-radius: var(--r);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-mid);
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        flex: 1;
        margin-right: 8px;
      }
      .route-status-btn.has-route {
        border-color: var(--green);
        color: var(--green);
      }
      .route-status-btn:active {
        background: var(--green-light);
      }
      .rsb-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
      }
      .rsb-dot.on {
        background: var(--green);
        box-shadow: 0 0 0 2px rgba(28, 107, 69, 0.2);
      }
      .rsb-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: left;
      }

      /* Steps */
      .steps-row {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 14px;
      }
      .sdot {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        border: 2px solid var(--border);
        color: var(--text-muted);
        transition: all 0.25s;
        flex-shrink: 0;
      }
      .sdot.active {
        border-color: var(--green);
        background: var(--green);
        color: white;
      }
      .sdot.done {
        border-color: var(--green);
        background: var(--green-light);
        color: var(--green);
      }
      .sline {
        flex: 1;
        height: 2px;
        background: var(--border);
        border-radius: 1px;
        transition: background 0.25s;
      }
      .sline.done {
        background: var(--green);
      }

      .instruction {
        background: var(--green-pale);
        border-left: 3px solid var(--green);
        border-radius: 0 var(--r) var(--r) 0;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text-mid);
        margin-bottom: 14px;
        line-height: 1.5;
      }
      .instruction strong {
        color: var(--green);
      }

      /* Route preview */
      .route-preview {
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: var(--r);
        padding: 10px 12px;
        margin-bottom: 14px;
        display: none;
      }
      .route-preview.visible {
        display: block;
      }
      .rp-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        min-width: 0;
      }
      .rp-row + .rp-row {
        margin-top: 6px;
      }
      .rpdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .rpdot.s {
        background: var(--green);
      }
      .rpdot.e {
        background: var(--accent);
      }
      /* Truncate long place names — no vertical scroll from long text */
      .rp-label {
        font-weight: 500;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
      }
      .rp-dist {
        color: var(--text-muted);
        font-size: 11px;
        flex-shrink: 0;
        margin-left: 4px;
      }
      .rp-connector {
        width: 2px;
        height: 10px;
        background: var(--border);
        margin: 3px 0 3px 3px;
      }

      /* Form */
      .form-section {
        display: none;
      }
      .form-section.visible {
        display: block;
      }

      /* Action row — always visible, no hidden buttons */
      .action-row {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      /* Saved state */
      .saved-state {
        display: none;
        text-align: center;
        padding: 20px 0;
      }
      .saved-state.visible {
        display: block;
      }

      /* ── MY ROUTE PANEL (slides over sheet) ── */
      .route-panel {
        position: fixed;
        inset: 0;
        z-index: 300;
        background: var(--surface);
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
      }
      .route-panel.show {
        transform: translateY(0);
      }
      .rp-header {
        height: var(--nav);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 0.5px solid var(--border);
        flex-shrink: 0;
        background: var(--surface);
      }
      .rp-title {
        font-family: "DM Serif Display", serif;
        font-size: 18px;
        color: var(--text);
      }
      .rp-body {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 20px 16px calc(20px + var(--safe-b));
      }

      /* Saved route card */
      .src-card {
        background: var(--green-pale);
        border: 1px solid rgba(28, 107, 69, 0.15);
        border-radius: var(--rl);
        padding: 16px;
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
      }
      .src-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--green), var(--accent));
      }
      .src-from {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }
      .src-arr {
        font-size: 12px;
        color: var(--text-muted);
        margin: 4px 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .src-to {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-mid);
        margin-bottom: 12px;
      }
      .src-badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .src-actions {
        display: flex;
        gap: 8px;
      }
      .src-map-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-mid);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        touch-action: manipulation;
        transition: all 0.15s;
      }
      .src-map-btn:active {
        border-color: var(--green);
        color: var(--green);
        background: var(--green-pale);
      }
      .src-del-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        font-size: 13px;
        font-weight: 600;
        color: #dc3545;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        touch-action: manipulation;
        transition: all 0.15s;
      }
      .src-del-btn:active {
        border-color: #dc3545;
        background: #fff5f5;
      }

      /* No route */
      .no-route {
        text-align: center;
        padding: 40px 20px;
      }
      .no-route-icon {
        margin-bottom: 12px;
        color: var(--border);
      }
      .no-route-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
      }
      .no-route-sub {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 20px;
      }

      /* SVG icon helper */
      .ic {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="toast"><span id="toast-msg"></span></div>

    <!-- CONFIRM OVERLAY -->
    <div class="overlay" id="confirm-overlay">
      <div class="overlay-box">
        <div class="overlay-handle"></div>
        <div class="overlay-title">Delete your route?</div>
        <div class="overlay-sub" id="confirm-sub"></div>
        <div class="overlay-actions">
          <button class="btn btn-danger" id="confirm-ok">Delete route</button>
          <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- PROFILE MODAL -->
    <div class="profile-modal" id="profile-modal">
      <div class="profile-header">
        <div class="profile-avatar-lg" id="pm-avatar">?</div>
        <div>
          <div class="profile-name" id="pm-name"></div>
          <div class="profile-email" id="pm-email"></div>
        </div>
      </div>
      <a href="matches.html" class="profile-action">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        My matches
      </a>
      <div class="divider"></div>
      <button class="profile-action" onclick="togglePwPanel()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Change password
      </button>
      <div class="pw-panel" id="pw-panel">
        <div class="input-wrap" style="margin-bottom: 8px">
          <input
            class="input"
            id="new-pw"
            type="password"
            placeholder="New password (min 6 chars)"
            style="font-size: 14px; padding: 10px 12px"
          />
        </div>
        <button
          class="btn btn-sm"
          style="width: 100%"
          onclick="changePassword()"
        >
          Update
        </button>
      </div>
      <div class="divider"></div>
      <button class="profile-action danger" onclick="logout()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Sign out
      </button>
    </div>

    <!-- NAV -->
    <nav class="nav">
      <a class="logo" href="index.html">Ham<span>Safar</span></a>
      <div class="user-chip" id="user-chip" onclick="toggleProfileModal()">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name">...</span>
        <svg
          width="10"
          height="10"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        >
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>
    </nav>

    <!-- MAP -->
    <div id="map"></div>

    <!-- SEARCH — top left, below nav -->
    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-ic">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </span>
        <input
          class="search-field"
          id="search-input"
          type="text"
          placeholder="Search area..."
          oninput="onSearchInput(this.value)"
          onkeydown="onSearchKey(event)"
          autocomplete="off"
        />
      </div>
      <div class="search-dd" id="search-dd"></div>
    </div>

    <!-- MAP HINT -->
    <div class="map-hint" id="map-hint">Tap to set starting point</div>

    <!-- MAP LOADING -->
    <div class="map-loading hidden" id="map-loading">
      <div class="spinner spinner-green"></div>
      <span id="map-loading-text">Calculating route...</span>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-scroll">
        <!-- Route status -->
        <div class="route-status-row">
          <button
            class="route-status-btn"
            id="route-status-btn"
            onclick="showRoutePanel()"
          >
            <div class="rsb-dot" id="rsb-dot"></div>
            <span class="rsb-text" id="rsb-text">No route saved</span>
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
          <a
            href="matches.html"
            class="btn btn-sm btn-ghost"
            style="white-space: nowrap"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            Matches
          </a>
        </div>

        <!-- Steps -->
        <div class="steps-row">
          <div class="sdot active" id="sd1">1</div>
          <div class="sline" id="sl1"></div>
          <div class="sdot" id="sd2">2</div>
          <div class="sline" id="sl2"></div>
          <div class="sdot" id="sd3">3</div>
        </div>

        <div class="instruction" id="instruction">
          Tap anywhere on the map to set your <strong>starting point</strong>
        </div>

        <!-- Route preview — truncated labels prevent vertical scroll from long names -->
        <div class="route-preview" id="route-preview">
          <div class="rp-row">
            <div class="rpdot s"></div>
            <div class="rp-label" id="prev-start">—</div>
          </div>
          <div class="rp-connector" style="margin-left: 3px"></div>
          <div class="rp-row">
            <div class="rpdot e"></div>
            <div class="rp-label" id="prev-end">—</div>
            <div class="rp-dist" id="prev-dist"></div>
          </div>
        </div>

        <!-- Schedule form -->
        <div class="form-section" id="form-section">
          <div class="input-wrap">
            <label class="input-label">I am a</label>
            <div class="toggle-group">
              <label class="toggle-opt"
                ><input type="radio" name="role" value="driver" checked /><span
                  >Driver</span
                ></label
              >
              <label class="toggle-opt"
                ><input type="radio" name="role" value="passenger" /><span
                  >Passenger</span
                ></label
              >
              <label class="toggle-opt"
                ><input type="radio" name="role" value="both" /><span
                  >Both</span
                ></label
              >
            </div>
          </div>
          <div class="form-row">
            <div class="input-wrap">
              <label class="input-label">Departure</label>
              <div class="select-wrap">
                <select class="input" id="depart-time">
                  <option value="06:00">6:00 AM</option>
                  <option value="07:00">7:00 AM</option>
                  <option value="08:00" selected>8:00 AM</option>
                  <option value="09:00">9:00 AM</option>
                  <option value="10:00">10:00 AM</option>
                  <option value="11:00">11:00 AM</option>
                  <option value="12:00">12:00 PM</option>
                </select>
              </div>
            </div>
            <div class="input-wrap">
              <label class="input-label">Gender pref</label>
              <div class="select-wrap">
                <select class="input" id="gender-pref">
                  <option value="any">Any</option>
                  <option value="women">Women only</option>
                  <option value="men">Men only</option>
                </select>
              </div>
            </div>
          </div>
          <div class="input-wrap">
            <label class="input-label">Travel days</label>
            <div style="display: flex; gap: 5px; flex-wrap: wrap">
              <div class="day-chip selected" data-day="mon">Mon</div>
              <div class="day-chip selected" data-day="tue">Tue</div>
              <div class="day-chip selected" data-day="wed">Wed</div>
              <div class="day-chip selected" data-day="thu">Thu</div>
              <div class="day-chip selected" data-day="fri">Fri</div>
              <div class="day-chip" data-day="sat">Sat</div>
            </div>
          </div>
          <div class="action-row">
            <button
              class="btn btn-ghost"
              onclick="clearMap()"
              style="flex: 0.38"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
              Clear
            </button>
            <button
              class="btn"
              id="save-btn"
              onclick="saveRoute()"
              style="flex: 1"
            >
              Save & find matches
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Saved state -->
        <div class="saved-state" id="saved-state">
          <div
            style="
              width: 48px;
              height: 48px;
              border-radius: 50%;
              background: var(--green-light);
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto 12px;
            "
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="var(--green)"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div
            style="
              font-size: 16px;
              font-weight: 600;
              color: var(--text);
              margin-bottom: 4px;
            "
          >
            Route saved
          </div>
          <div
            style="
              font-size: 13px;
              color: var(--text-muted);
              margin-bottom: 16px;
            "
          >
            Finding people on your corridor...
          </div>
          <a class="btn" href="matches.html">View my matches</a>
        </div>
      </div>
    </div>

    <!-- MY ROUTE PANEL (full screen slide) -->
    <div class="route-panel" id="route-panel">
      <div class="rp-header">
        <button
          class="btn-ghost btn-sm"
          onclick="hideRoutePanel()"
          style="display: flex; align-items: center; gap: 6px"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Back
        </button>
        <span class="rp-title">My Route</span>
        <div style="width: 60px"></div>
      </div>
      <div class="rp-body" id="rp-body"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const API = "http://192.168.100.10:3001";
      const token = localStorage.getItem("hs_token");
      const user = JSON.parse(localStorage.getItem("hs_user") || "null");
      if (!token || !user) window.location.href = "index.html";

      document.getElementById("user-avatar").textContent =
        user?.name?.[0]?.toUpperCase() || "?";
      document.getElementById("user-name").textContent =
        user?.name?.split(" ")[0] || "";
      document.getElementById("pm-avatar").textContent =
        user?.name?.[0]?.toUpperCase() || "?";
      document.getElementById("pm-name").textContent = user?.name || "";
      document.getElementById("pm-email").textContent = user?.email || "";

      // MAP
      const map = L.map("map", { zoomControl: false }).setView(
        [24.86, 67.01],
        13,
      );
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
        maxZoom: 19,
      }).addTo(map);
      L.control.zoom({ position: "bottomright" }).addTo(map);

      // Invalidate map size after sheet appears
      setTimeout(() => map.invalidateSize(), 400);

      // STATE
      let pins = [],
        routeLayer = null,
        routeData = null,
        routeSaved = false;
      let selectedDays = ["mon", "tue", "wed", "thu", "fri"];
      let savedRoute = null,
        savedRouteLayer = null;

      // DAY CHIPS
      document.querySelectorAll(".day-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const d = chip.dataset.day;
          if (selectedDays.includes(d)) {
            selectedDays = selectedDays.filter((x) => x !== d);
            chip.classList.remove("selected");
          } else {
            selectedDays.push(d);
            chip.classList.add("selected");
          }
        });
      });

      // LOAD MY ROUTE
      async function loadMyRoute() {
        try {
          const res = await fetch(`${API}/api/routes/mine`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.status === 401) {
            localStorage.clear();
            window.location.href = "index.html";
            return;
          }
          const routes = await res.json();
          savedRoute = routes[0] || null;
          updateStatusBtn();
          renderRoutePanel();
          if (savedRoute) showSavedOnMap();
        } catch (e) {
          console.error(e);
        }
      }

      function updateStatusBtn() {
        const dot = document.getElementById("rsb-dot");
        const txt = document.getElementById("rsb-text");
        const btn = document.getElementById("route-status-btn");
        if (savedRoute) {
          dot.classList.add("on");
          btn.classList.add("has-route");
          txt.textContent = `${savedRoute.start_label || "Route"} → ${savedRoute.end_label || ""}`;
          setInstruction(
            "You have a route saved. Tap <strong>My Route</strong> to view or delete it.",
            1,
          );
          setHint("");
        } else {
          dot.classList.remove("on");
          btn.classList.remove("has-route");
          txt.textContent = "No route saved";
          setInstruction(
            "Tap anywhere on the map to set your <strong>starting point</strong>",
            1,
          );
          setHint("Tap to set starting point");
        }
      }

      function renderRoutePanel() {
        const el = document.getElementById("rp-body");
        if (!savedRoute) {
          el.innerHTML = `<div class="no-route">
      <div class="no-route-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div class="no-route-title">No route saved yet</div>
      <div class="no-route-sub">Go back and draw your daily commute on the map.</div>
      <button class="btn btn-ghost" onclick="hideRoutePanel()" style="width:auto;padding:10px 20px">Draw a route</button>
    </div>`;
          return;
        }
        const time = formatTime(savedRoute.depart_time);
        const role =
          savedRoute.role === "driver"
            ? "Driver"
            : savedRoute.role === "passenger"
              ? "Passenger"
              : "Both";
        const days = Array.isArray(savedRoute.days)
          ? savedRoute.days
              .map((d) => d.charAt(0).toUpperCase() + d.slice(1, 3))
              .join(", ")
          : "";
        el.innerHTML = `
    <div class="src-card">
      <div class="src-from">${savedRoute.start_label || "Origin"}</div>
      <div class="src-arr"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> to destination</div>
      <div class="src-to">${savedRoute.end_label || "Destination"}</div>
      <div class="src-badges">
        <span class="badge badge-green">${role}</span>
        <span class="badge badge-blue">${time}</span>
        ${days ? `<span class="badge badge-gray">${days}</span>` : ""}
      </div>
      <div class="src-actions">
        <button class="src-map-btn" onclick="showSavedOnMap(true)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Show on map
        </button>
        <button class="src-del-btn" onclick="confirmDelete()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
      </div>
    </div>
    <a href="matches.html" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      View my matches
    </a>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:12px;line-height:1.5">Delete this route to draw a new one.</p>`;
      }

      function showSavedOnMap(flyTo = false) {
        if (!savedRoute?.path_geojson) return;
        if (savedRouteLayer) {
          savedRouteLayer._markers?.forEach((m) => map.removeLayer(m));
          map.removeLayer(savedRouteLayer);
          savedRouteLayer = null;
        }
        const geojson = JSON.parse(savedRoute.path_geojson);
        const coords = geojson.coordinates.map(([lng, lat]) => [lat, lng]);
        savedRouteLayer = L.polyline(coords, {
          color: "#1C6B45",
          weight: 5,
          opacity: 0.8,
          lineCap: "round",
          lineJoin: "round",
          dashArray: "8 5",
        }).addTo(map);
        const mk = (color) =>
          L.divIcon({
            className: "",
            html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 1px 6px rgba(0,0,0,.25)"></div>`,
            iconSize: [12, 12],
            iconAnchor: [6, 6],
          });
        const sg = JSON.parse(savedRoute.start_geojson),
          eg = JSON.parse(savedRoute.end_geojson);
        const sm = L.marker([sg.coordinates[1], sg.coordinates[0]], {
          icon: mk("#1C6B45"),
        }).addTo(map);
        const em = L.marker([eg.coordinates[1], eg.coordinates[0]], {
          icon: mk("#E8960C"),
        }).addTo(map);
        savedRouteLayer._markers = [sm, em];
        if (flyTo) {
          map.flyToBounds(savedRouteLayer.getBounds(), {
            padding: [40, 60],
            duration: 0.8,
          });
          hideRoutePanel();
        }
      }

      // PANELS
      function showRoutePanel() {
        document.getElementById("route-panel").classList.add("show");
      }
      function hideRoutePanel() {
        document.getElementById("route-panel").classList.remove("show");
      }

      // DELETE
      function confirmDelete() {
        document.getElementById("confirm-sub").textContent =
          `"${savedRoute?.start_label || "Route"} → ${savedRoute?.end_label || ""}" will be removed permanently.`;
        document.getElementById("confirm-ok").onclick = doDelete;
        document.getElementById("confirm-overlay").classList.add("show");
      }
      function closeConfirm() {
        document.getElementById("confirm-overlay").classList.remove("show");
      }
      async function doDelete() {
        const btn = document.getElementById("confirm-ok");
        btn.disabled = true;
        btn.textContent = "Deleting...";
        try {
          const res = await fetch(`${API}/api/routes/${savedRoute.id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) throw new Error();
          if (savedRouteLayer) {
            savedRouteLayer._markers?.forEach((m) => map.removeLayer(m));
            map.removeLayer(savedRouteLayer);
            savedRouteLayer = null;
          }
          savedRoute = null;
          updateStatusBtn();
          renderRoutePanel();
          closeConfirm();
          hideRoutePanel();
          clearMap();
          toast("Route deleted. Draw a new one.", "success");
        } catch {
          toast("Could not delete route", "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Delete route";
        }
      }

      // MAP CLICK
      map.on("click", async (e) => {
        if (savedRoute) {
          toast("Delete your current route first from My Route.", "warn");
          return;
        }
        if (routeSaved || pins.length >= 2) return;
        const isStart = pins.length === 0;
        const color = isStart ? "#1C6B45" : "#E8960C";
        const icon = L.divIcon({
          className: "",
          html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.25)"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7],
        });
        pins.push({
          latlng: e.latlng,
          marker: L.marker(e.latlng, { icon }).addTo(map),
        });
        if (isStart) {
          setInstruction(
            "Now tap your <strong>destination</strong> on the map",
            2,
          );
          setHint("Tap to set destination");
          setStep(2);
          return;
        }
        setHint("");
        showLoading("Calculating route...");
        try {
          routeData = await fetchOSRM(pins[0].latlng, pins[1].latlng);
          routeLayer = L.polyline(routeData.coords, {
            color: "#00C060",
            weight: 6,
            opacity: 1,
            lineCap: "round",
            lineJoin: "round",
          }).addTo(map);
          map.fitBounds(routeLayer.getBounds(), { padding: [40, 60] });
          const [sl, el] = await Promise.all([
            reverseGeocode(pins[0].latlng),
            reverseGeocode(pins[1].latlng),
          ]);
          document.getElementById("prev-start").textContent = sl;
          document.getElementById("prev-end").textContent = el;
          document.getElementById("prev-dist").textContent =
            `${routeData.distKm} km`;
          document.getElementById("route-preview").classList.add("visible");
          document.getElementById("form-section").classList.add("visible");
          setInstruction(
            `Route ready — ${routeData.distKm} km. Set your schedule below.`,
            3,
          );
          setStep(3);
          routeData.startLabel = sl;
          routeData.endLabel = el;
          // Scroll sheet to show form
          document.querySelector(".sheet-scroll").scrollTop = 0;
        } catch (err) {
          toast(err.message, "error");
          setInstruction("Could not find a route. Try different points.", 1);
          map.removeLayer(pins[1].marker);
          pins.pop();
          setStep(1);
          setHint("Tap to set destination");
        } finally {
          hideLoading();
        }
      });

      async function fetchOSRM(start, end) {
        const url = `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson&annotations=true`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Routing service unavailable");
        const data = await res.json();
        if (data.code !== "Ok") throw new Error("No road route found");
        const r = data.routes[0];
        return {
          coords: r.geometry.coordinates.map(([lng, lat]) => [lat, lng]),
          wayIds: r.legs[0].annotation.nodes,
          geojson: r.geometry,
          distKm: (r.distance / 1000).toFixed(1),
        };
      }

      const gcCache = {};
      async function reverseGeocode(latlng) {
        const key = `${latlng.lat.toFixed(4)},${latlng.lng.toFixed(4)}`;
        if (gcCache[key]) return gcCache[key];
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${latlng.lat}&lon=${latlng.lng}&format=json`,
            { headers: { "Accept-Language": "en" } },
          );
          const d = await res.json();
          const label =
            d.address?.suburb ||
            d.address?.neighbourhood ||
            d.address?.road ||
            d.address?.city_district ||
            "Karachi";
          gcCache[key] = label;
          return label;
        } catch {
          return "Karachi";
        }
      }

      // SEARCH
      let sTimer = null,
        sResults = [],
        sIdx = -1;
      async function onSearchInput(val) {
        clearTimeout(sTimer);
        const dd = document.getElementById("search-dd");
        if (val.length < 2) {
          dd.classList.remove("show");
          dd.innerHTML = "";
          return;
        }
        sTimer = setTimeout(async () => {
          try {
            const res = await fetch(
              `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val + ", Karachi")}&format=json&limit=5&countrycodes=pk&viewbox=66.85,25.18,67.45,24.74&bounded=1`,
              {
                headers: { "Accept-Language": "en", "User-Agent": "HamSafar" },
              },
            );
            sResults = await res.json();
            if (!sResults.length) {
              dd.classList.remove("show");
              return;
            }
            dd.innerHTML = sResults
              .map((r, i) => {
                const p = r.display_name.split(",").map((s) => s.trim());
                return `<div class="search-item" onclick="selectSearch(${i})"><div class="si-name">${p[0]}</div><div class="si-sub">${p.slice(1, 3).join(", ")}</div></div>`;
              })
              .join("");
            dd.classList.add("show");
            sIdx = -1;
          } catch {
            dd.classList.remove("show");
          }
        }, 350);
      }
      function onSearchKey(e) {
        const dd = document.getElementById("search-dd"),
          items = dd.querySelectorAll(".search-item");
        if (e.key === "ArrowDown") {
          e.preventDefault();
          sIdx = Math.min(sIdx + 1, items.length - 1);
          items.forEach(
            (el, i) =>
              (el.style.background = i === sIdx ? "var(--green-pale)" : ""),
          );
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          sIdx = Math.max(sIdx - 1, 0);
          items.forEach(
            (el, i) =>
              (el.style.background = i === sIdx ? "var(--green-pale)" : ""),
          );
        } else if (e.key === "Enter" && sIdx >= 0) selectSearch(sIdx);
        else if (e.key === "Escape") {
          dd.classList.remove("show");
          document.getElementById("search-input").blur();
        }
      }
      function selectSearch(idx) {
        const r = sResults[idx];
        if (!r) return;
        map.flyTo([parseFloat(r.lat), parseFloat(r.lon)], 15, { duration: 1 });
        const ti = L.divIcon({
          className: "",
          html: `<div style="width:18px;height:18px;border-radius:50%;background:rgba(28,107,69,.2);border:2px solid var(--green)"></div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9],
        });
        const tm = L.marker([parseFloat(r.lat), parseFloat(r.lon)], {
          icon: ti,
        }).addTo(map);
        setTimeout(() => map.removeLayer(tm), 3000);
        document.getElementById("search-input").value = "";
        document.getElementById("search-dd").classList.remove("show");
      }
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrap"))
          document.getElementById("search-dd").classList.remove("show");
      });

      // SAVE ROUTE
      async function saveRoute() {
        if (!routeData) return toast("Draw your route first", "error");
        if (!selectedDays.length)
          return toast("Select at least one day", "warn");
        const btn = document.getElementById("save-btn");
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Saving...';
        try {
          const res = await fetch(`${API}/api/routes`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              startLat: pins[0].latlng.lat,
              startLng: pins[0].latlng.lng,
              startLabel: routeData.startLabel,
              endLat: pins[1].latlng.lat,
              endLng: pins[1].latlng.lng,
              endLabel: routeData.endLabel,
              wayIds: routeData.wayIds,
              geojson: routeData.geojson,
              departTime: document.getElementById("depart-time").value,
              role: document.querySelector('input[name="role"]:checked').value,
              genderPref: document.getElementById("gender-pref").value,
              days: selectedDays,
            }),
          });
          if (res.status === 401) {
            localStorage.clear();
            window.location.href = "index.html";
            return;
          }
          const data = await res.json();
          if (!res.ok) {
            if (data.limitReached) {
              toast(data.error, "warn");
              btn.disabled = false;
              btn.innerHTML =
                'Save & find matches <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>';
              return;
            }
            throw new Error(data.error || "Failed");
          }
          routeSaved = true;
          document.getElementById("form-section").classList.remove("visible");
          document.getElementById("saved-state").classList.add("visible");
          toast("Route saved!", "success");
          await loadMyRoute();
          setTimeout(() => (window.location.href = "matches.html"), 2000);
        } catch (err) {
          btn.disabled = false;
          btn.innerHTML =
            'Save & find matches <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>';
          toast(err.message, "error");
        }
      }

      function clearMap() {
        pins.forEach((p) => map.removeLayer(p.marker));
        pins = [];
        if (routeLayer) {
          map.removeLayer(routeLayer);
          routeLayer = null;
        }
        routeData = null;
        routeSaved = false;
        document.getElementById("route-preview").classList.remove("visible");
        document.getElementById("form-section").classList.remove("visible");
        document.getElementById("saved-state").classList.remove("visible");
        setStep(1);
        if (!savedRoute) {
          setInstruction(
            "Tap anywhere on the map to set your <strong>starting point</strong>",
            1,
          );
          setHint("Tap to set starting point");
        } else {
          setInstruction(
            "You have a route saved. Tap <strong>My Route</strong> to view or delete it.",
            1,
          );
          setHint("");
        }
      }

      // PROFILE MODAL
      let profileOpen = false;
      function toggleProfileModal() {
        profileOpen = !profileOpen;
        document
          .getElementById("profile-modal")
          .classList.toggle("show", profileOpen);
      }
      document.addEventListener("click", (e) => {
        if (
          profileOpen &&
          !e.target.closest("#profile-modal") &&
          !e.target.closest("#user-chip")
        ) {
          profileOpen = false;
          document.getElementById("profile-modal").classList.remove("show");
        }
      });
      function togglePwPanel() {
        document.getElementById("pw-panel").classList.toggle("show");
      }
      async function changePassword() {
        const pw = document.getElementById("new-pw").value;
        if (pw.length < 6) return toast("Minimum 6 characters", "warn");
        try {
          const res = await fetch(`${API}/api/auth/change-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ password: pw }),
          });
          if (!res.ok) throw new Error();
          document.getElementById("new-pw").value = "";
          document.getElementById("pw-panel").classList.remove("show");
          toast("Password updated", "success");
        } catch {
          toast("Could not update password", "error");
        }
      }
      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }

      // HELPERS
      function formatTime(t) {
        if (!t) return "";
        const [h, m] = t.split(":").map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
      }
      function setInstruction(html) {
        document.getElementById("instruction").innerHTML = html;
      }
      function setStep(n) {
        for (let i = 1; i <= 3; i++) {
          const d = document.getElementById(`sd${i}`),
            l = document.getElementById(`sl${i}`);
          if (i < n) {
            d.className = "sdot done";
            d.textContent = "✓";
          }
          if (i === n) {
            d.className = "sdot active";
            d.textContent = i;
          }
          if (i > n) {
            d.className = "sdot";
            d.textContent = i;
          }
          if (l) l.className = "sline" + (i < n ? " done" : "");
        }
      }
      function setHint(t) {
        const h = document.getElementById("map-hint");
        h.textContent = t;
        h.classList.toggle("hidden", !t);
      }
      function showLoading(t) {
        document.getElementById("map-loading-text").textContent = t;
        document.getElementById("map-loading").classList.remove("hidden");
      }
      function hideLoading() {
        document.getElementById("map-loading").classList.add("hidden");
      }
      let _t;
      function toast(msg, type = "success") {
        const t = document.getElementById("toast");
        document.getElementById("toast-msg").textContent = msg;
        t.className = `show ${type}`;
        clearTimeout(_t);
        _t = setTimeout(() => (t.className = ""), 3500);
      }

      // ── DRAGGABLE SHEET ───────────────────────────────────────────────────────
      const sheet = document.getElementById("sheet");
      const handle = document.querySelector(".sheet-handle");
      const PEEK = 52;
      const MID = 230;
      const getFULL = () => window.innerHeight - 72; // nearly full screen minus nav
      let sheetH = MID,
        dragStart = null,
        dragStartH = null,
        dragging = false;

      function setSheetH(h, animate) {
        sheetH = Math.max(PEEK, Math.min(getFULL(), h));
        sheet.style.transition = animate
          ? "height .25s cubic-bezier(.4,0,.2,1)"
          : "none";
        sheet.style.height = sheetH + "px";
        map.invalidateSize();
      }
      function snapSheet(vel) {
        const snaps = [PEEK, MID, getFULL()];
        const target = snaps.reduce((p, c) =>
          Math.abs(c - sheetH - vel * 80) < Math.abs(p - sheetH - vel * 80)
            ? c
            : p,
        );
        setSheetH(target, true);
      }
      handle.addEventListener(
        "touchstart",
        (e) => {
          dragStart = e.touches[0].clientY;
          dragStartH = sheetH;
          dragging = true;
          sheet.style.transition = "none";
        },
        { passive: true },
      );
      handle.addEventListener(
        "touchmove",
        (e) => {
          if (!dragging) return;
          setSheetH(dragStartH + (dragStart - e.touches[0].clientY), false);
        },
        { passive: true },
      );
      handle.addEventListener("touchend", (e) => {
        if (!dragging) return;
        dragging = false;
        snapSheet((dragStart - e.changedTouches[0].clientY) / 80);
      });
      const scroll = document.querySelector(".sheet-scroll");
      let sDragStart = null,
        sDragStartH = null,
        sDragging = false;
      scroll.addEventListener(
        "touchstart",
        (e) => {
          if (scroll.scrollTop > 0) return;
          sDragStart = e.touches[0].clientY;
          sDragStartH = sheetH;
          sDragging = true;
        },
        { passive: true },
      );
      scroll.addEventListener(
        "touchmove",
        (e) => {
          if (!sDragging || scroll.scrollTop > 0) {
            sDragging = false;
            return;
          }
          const dy = sDragStart - e.touches[0].clientY;
          setSheetH(sDragStartH + dy, false);
          if (Math.abs(dy) > 6) e.preventDefault();
        },
        { passive: false },
      );
      scroll.addEventListener("touchend", (e) => {
        if (!sDragging) return;
        sDragging = false;
        snapSheet((sDragStart - e.changedTouches[0].clientY) / 80);
      });
      // Auto-expand when route is ready
      const _origSetStep = setStep;
      setStep = (n) => {
        _origSetStep(n);
        if (n >= 2 && sheetH < MID) setSheetH(MID, true);
        if (n === 3) setSheetH(getFULL(), true);
      };
      setSheetH(MID, false);

      loadMyRoute();
    </script>
  </body>
</html>
