<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>HamSafar — Matches</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        padding-top: var(--nav);
      }
      .container {
        max-width: 640px;
        margin: 0 auto;
        padding: 20px 14px calc(32px + var(--safe-b));
      }
      .page-title {
        font-family: "DM Serif Display", serif;
        font-size: 26px;
        color: var(--text);
        letter-spacing: -0.3px;
        margin-bottom: 4px;
      }
      .page-sub {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 20px;
      }

      .stats-bar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      .stat-item {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--r);
        padding: 12px;
        text-align: center;
      }
      .stat-num {
        font-family: "DM Serif Display", serif;
        font-size: 22px;
        color: var(--green);
        line-height: 1;
        margin-bottom: 3px;
      }
      .stat-lbl {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .filter-row {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
        overflow-x: auto;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filter-row::-webkit-scrollbar {
        display: none;
      }
      .fchip {
        flex-shrink: 0;
        padding: 6px 13px;
        border-radius: 100px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-mid);
        cursor: pointer;
        transition: all 0.12s;
        touch-action: manipulation;
      }
      .fchip.active {
        background: var(--green);
        border-color: var(--green);
        color: white;
      }
      .fchip:active {
        transform: scale(0.97);
      }

      .section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        padding: 6px 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 0.5px;
        background: var(--border);
      }

      .match-card {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--rl);
        padding: 16px;
        margin-bottom: 10px;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
        animation: pageIn 0.3s ease both;
        touch-action: manipulation;
      }
      .match-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        border-radius: 2px 0 0 2px;
      }
      .match-card.segment::before {
        background: var(--green);
      }
      .match-card.proximity::before {
        background: var(--accent);
      }

      .match-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .match-user {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
      }
      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--green-light);
        border: 1.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Serif Display", serif;
        font-size: 15px;
        color: var(--green);
        flex-shrink: 0;
      }
      .avatar.female {
        background: #fce8f3;
        color: #9d174d;
        border-color: #f0c4dc;
      }
      .match-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .match-meta {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      .mdot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
      }

      .score {
        text-align: right;
        flex-shrink: 0;
      }
      .score-num {
        font-family: "DM Serif Display", serif;
        font-size: 26px;
        line-height: 1;
      }
      .score-num.seg {
        color: var(--green);
      }
      .score-num.prox {
        color: var(--accent);
        font-size: 18px;
        margin-top: 4px;
      }
      .score-lbl {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .route-row {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--bg);
        border-radius: var(--r);
        padding: 10px 12px;
        margin-bottom: 12px;
        font-size: 13px;
        flex-wrap: nowrap;
        overflow: hidden;
      }
      .rr-from {
        font-weight: 600;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }
      .rr-arr {
        color: var(--text-muted);
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }
      .rr-to {
        font-weight: 600;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
        text-align: right;
      }

      .prox-info {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 12px;
        padding: 0 2px;
      }

      .match-actions {
        display: flex;
        gap: 8px;
      }
      .wa-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 11px 14px;
        background: #25d366;
        color: white;
        border: none;
        border-radius: var(--r);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition:
          background 0.15s,
          transform 0.1s;
        touch-action: manipulation;
      }
      .wa-btn:active {
        background: #1eb358;
        transform: scale(0.98);
      }
      .map-btn {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--r);
        cursor: pointer;
        transition: all 0.12s;
        flex-shrink: 0;
        touch-action: manipulation;
      }
      .map-btn:active {
        background: var(--green-light);
        border-color: var(--green);
      }
      .map-btn.disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .empty-state {
        text-align: center;
        padding: 48px 20px;
      }
      .empty-icon {
        color: var(--border);
        margin-bottom: 14px;
      }
      .empty-title {
        font-family: "DM Serif Display", serif;
        font-size: 20px;
        color: var(--text);
        margin-bottom: 6px;
      }
      .empty-sub {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 24px;
        max-width: 280px;
        margin-left: auto;
        margin-right: auto;
      }

      .match-skeleton {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--rl);
        padding: 16px;
        margin-bottom: 10px;
      }

      /* Map modal */
      .map-modal {
        position: fixed;
        inset: 0;
        z-index: 400;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-end;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .map-modal.show {
        opacity: 1;
        pointer-events: auto;
      }
      .map-modal-inner {
        width: 100%;
        background: var(--surface);
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        max-height: 80dvh;
      }
      .map-modal.show .map-modal-inner {
        transform: translateY(0);
      }
      .mm-header {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 0.5px solid var(--border);
      }
      .mm-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }
      .mm-close {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--bg);
        border: 0.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        touch-action: manipulation;
      }
      .mm-close:active {
        background: var(--border);
      }
      #modal-map-wrap {
        min-height: 200px;
      }
      #modal-map {
        height: min(360px, 50dvh);
      }
      .mm-no-geo {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 200px;
        gap: 8px;
        color: var(--text-muted);
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }

      /* ── FEEDBACK ── */
      .feedback-fab {
        position: fixed;
        bottom: calc(20px + var(--safe-b));
        right: 16px;
        z-index: 100;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--green);
        color: white;
        border: none;
        box-shadow: 0 4px 16px rgba(28, 107, 69, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        touch-action: manipulation;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .feedback-fab:active {
        transform: scale(0.92);
        box-shadow: 0 2px 8px rgba(28, 107, 69, 0.25);
      }
      .stars {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-bottom: 16px;
      }
      .star {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.15s;
        touch-action: manipulation;
        font-size: 0;
      }
      .star svg {
        width: 18px;
        height: 18px;
        stroke: var(--text-muted);
        fill: none;
        transition: all 0.15s;
      }
      .star.selected {
        background: var(--accent);
        border-color: var(--accent);
      }
      .star.selected svg {
        stroke: white;
        fill: white;
      }
      .star:active {
        transform: scale(0.9);
      }
      .fb-textarea {
        width: 100%;
        padding: 11px 13px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--r);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        color: var(--text);
        resize: none;
        outline: none;
        transition: border-color 0.15s;
      }
      .fb-textarea:focus {
        border-color: var(--green);
      }
    </style>
  </head>
  <body>
    <div id="toast"><span id="toast-msg"></span></div>

    <!-- PROFILE MODAL -->
    <div class="profile-modal" id="profile-modal">
      <div class="profile-header">
        <div class="profile-avatar-lg" id="pm-avatar">?</div>
        <div>
          <div class="profile-name" id="pm-name"></div>
          <div class="profile-email" id="pm-email"></div>
        </div>
      </div>
      <a href="app.html" class="profile-action">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
        My route
      </a>
      <div class="divider"></div>
      <button class="profile-action" onclick="togglePwPanel()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Change password
      </button>
      <div class="pw-panel" id="pw-panel">
        <div class="input-wrap" style="margin-bottom: 8px">
          <input
            class="input"
            id="new-pw"
            type="password"
            placeholder="New password (min 6 chars)"
            style="font-size: 14px; padding: 10px 12px"
          />
        </div>
        <button
          class="btn btn-sm"
          style="width: 100%"
          onclick="changePassword()"
        >
          Update
        </button>
      </div>
      <div class="divider"></div>
      <button class="profile-action danger" onclick="logout()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Sign out
      </button>
    </div>

    <!-- MAP MODAL -->
    <div class="map-modal" id="map-modal" onclick="handleModalBg(event)">
      <div class="map-modal-inner">
        <div class="mm-header">
          <div class="mm-title" id="mm-title">Shared road</div>
          <button class="mm-close" onclick="closeModal()">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div id="modal-map-wrap"></div>
      </div>
    </div>

    <!-- NAV -->
    <nav class="nav">
      <a class="logo" href="index.html">Ham<span>Safar</span></a>
      <div style="display: flex; gap: 8px; align-items: center">
        <a href="app.html" class="btn btn-sm btn-ghost">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          Route
        </a>
        <div class="user-chip" id="user-chip" onclick="toggleProfileModal()">
          <div class="user-avatar" id="user-avatar">?</div>
          <span id="user-name"></span>
          <svg
            width="10"
            height="10"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>
      </div>
    </nav>

    <div class="container page-enter">
      <h1 class="page-title">Your matches</h1>
      <p class="page-sub" id="page-sub">Finding commuters on your route...</p>

      <div class="stats-bar" id="stats-bar" style="display: none">
        <div class="stat-item">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-seg">0</div>
          <div class="stat-lbl">Same road</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-prox">0</div>
          <div class="stat-lbl">Similar area</div>
        </div>
      </div>

      <div class="filter-row" id="filter-row" style="display: none">
        <div class="fchip active" onclick="filter('all', this)">All</div>
        <div class="fchip" onclick="filter('segment', this)">Same road</div>
        <div class="fchip" onclick="filter('proximity', this)">
          Similar area
        </div>
        <div class="fchip" onclick="filter('driver', this)">Drivers</div>
        <div class="fchip" onclick="filter('passenger', this)">Passengers</div>
      </div>

      <div id="matches-container">
        <div class="match-skeleton">
          <div style="display: flex; gap: 10px; margin-bottom: 12px">
            <div
              class="skeleton"
              style="width: 42px; height: 42px; border-radius: 50%"
            ></div>
            <div style="flex: 1">
              <div
                class="skeleton"
                style="height: 15px; width: 55%; margin-bottom: 7px"
              ></div>
              <div class="skeleton" style="height: 11px; width: 38%"></div>
            </div>
          </div>
          <div
            class="skeleton"
            style="height: 40px; border-radius: 10px; margin-bottom: 10px"
          ></div>
          <div class="skeleton" style="height: 38px; border-radius: 10px"></div>
        </div>
        <div class="match-skeleton" style="opacity: 0.5">
          <div style="display: flex; gap: 10px; margin-bottom: 12px">
            <div
              class="skeleton"
              style="width: 42px; height: 42px; border-radius: 50%"
            ></div>
            <div style="flex: 1">
              <div
                class="skeleton"
                style="height: 15px; width: 45%; margin-bottom: 7px"
              ></div>
              <div class="skeleton" style="height: 11px; width: 32%"></div>
            </div>
          </div>
          <div
            class="skeleton"
            style="height: 40px; border-radius: 10px; margin-bottom: 10px"
          ></div>
          <div class="skeleton" style="height: 38px; border-radius: 10px"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const API = "http://192.168.100.10:3001";
      const token = localStorage.getItem("hs_token");
      const user = JSON.parse(localStorage.getItem("hs_user") || "null");
      if (!token || !user) window.location.href = "index.html";

      document.getElementById("user-avatar").textContent =
        user?.name?.[0]?.toUpperCase() || "?";
      document.getElementById("user-name").textContent =
        user?.name?.split(" ")[0] || "";
      document.getElementById("pm-avatar").textContent =
        user?.name?.[0]?.toUpperCase() || "?";
      document.getElementById("pm-name").textContent = user?.name || "";
      document.getElementById("pm-email").textContent = user?.email || "";

      let allMatches = [],
        modalMap = null;

      async function loadMatches() {
        try {
          const res = await fetch(`${API}/api/matches?minOverlap=10`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.status === 401) {
            localStorage.clear();
            window.location.href = "index.html";
            return;
          }
          if (!res.ok) throw new Error("Failed to load matches");
          allMatches = await res.json();
          renderMatches(allMatches);
        } catch (err) {
          document.getElementById("matches-container").innerHTML =
            `<div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-title">Could not load</div><p class="empty-sub">${err.message}</p><button class="btn" onclick="loadMatches()" style="width:auto;padding:10px 24px">Try again</button></div>`;
        }
      }

      function renderMatches(matches) {
        const c = document.getElementById("matches-container");
        if (!matches.length) {
          c.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div><div class="empty-title">No matches yet</div><p class="empty-sub">We're building the user base on your corridor. Share HamSafar to get matched faster.</p><button class="btn btn-ghost" onclick="shareApp()" style="width:auto;padding:10px 20px">Share HamSafar</button></div>`;
          document.getElementById("page-sub").textContent =
            "No matches found yet";
          return;
        }
        const seg = matches.filter((m) => m.match_type === "segment"),
          prox = matches.filter((m) => m.match_type === "proximity");
        document.getElementById("stat-total").textContent = matches.length;
        document.getElementById("stat-seg").textContent = seg.length;
        document.getElementById("stat-prox").textContent = prox.length;
        document.getElementById("stats-bar").style.display = "grid";
        document.getElementById("filter-row").style.display = "flex";
        document.getElementById("page-sub").textContent =
          `${matches.length} commuter${matches.length > 1 ? "s" : ""} found on your route`;
        c.innerHTML = "";
        if (seg.length) {
          const l = document.createElement("div");
          l.className = "section-label";
          l.textContent = "Same road overlap";
          c.appendChild(l);
          seg.forEach((m, i) => c.appendChild(buildCard(m, i, seg, prox)));
        }
        if (prox.length) {
          const l = document.createElement("div");
          l.className = "section-label";
          l.textContent = "Similar commute area";
          c.appendChild(l);
          prox.forEach((m, i) => c.appendChild(buildCard(m, i, seg, prox)));
        }
      }

      function buildCard(m, localIdx, seg, prox) {
        const card = document.createElement("div");
        const isSeg = m.match_type === "segment";
        card.className = `match-card ${m.match_type}`;
        card.style.animationDelay = `${(isSeg ? localIdx : seg.length + localIdx) * 0.06}s`;
        const initials = m.name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();
        const isFem = m.gender === "female";
        const roleLabel =
          m.role === "driver"
            ? "Driver"
            : m.role === "passenger"
              ? "Passenger"
              : "Both";
        const roleBadge = m.role === "driver" ? "badge-green" : "badge-blue";
        const timeLabel = m.depart_time ? formatTime(m.depart_time) : "";

        // Defined at top of buildCard so both branches can use it
        const fmtDist = (v) => {
          if (!v || v <= 0) return "< 100m";
          if (v < 100) return "< 100m";
          if (v < 1000) return `${Math.round(v)}m`;
          return `${(v / 1000).toFixed(1)} km`;
        };

        let scoreHTML;
        if (isSeg) {
          scoreHTML = `<div class="score"><div class="score-num seg">${m.overlap_pct}%</div><div class="score-lbl">overlap</div></div>`;
        } else {
          const okm = fmtDist(m.origin_dist_m);
          scoreHTML = `<div class="score"><div class="score-num prox" style="font-size:15px;margin-top:6px">${okm}</div><div class="score-lbl">orig. dist</div></div>`;
        }

        const routeSection = `<div class="route-row"><span class="rr-from">${m.start_label || "Origin"}</span><span class="rr-arr"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span><span class="rr-to">${m.end_label || "Destination"}</span></div>`;

        const proxInfo = !isSeg
          ? `<div class="prox-info"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Origins ${fmtDist(m.origin_dist_m)} apart · Destinations ${fmtDist(m.dest_dist_m)} apart</div>`
          : "";

        const hasGeo =
          isSeg && m.overlap_geojson && m.overlap_geojson !== "null";
        const globalIdx = isSeg ? seg.indexOf(m) : prox.indexOf(m);
        const mapBtnFn = hasGeo
          ? isSeg
            ? `showOnMap(${seg.indexOf(m)})`
            : ""
          : "";

        const waLink = `https://wa.me/92${m.phone.slice(1)}?text=${encodeURIComponent(`Hi ${m.name.split(" ")[0]}! I found you on HamSafar — we share a commute route in Karachi. Want to carpool?`)}`;

        card.innerHTML = `
    <div class="match-header">
      <div class="match-user">
        <div class="avatar ${isFem ? "female" : ""}">${initials}</div>
        <div style="min-width:0">
          <div class="match-name">${m.name}</div>
          <div class="match-meta">
            <span class="badge ${roleBadge}">${roleLabel}</span>
            ${timeLabel ? `<span class="mdot"></span><span>${timeLabel}</span>` : ""}
          </div>
        </div>
      </div>
      ${scoreHTML}
    </div>
    ${routeSection}
    ${proxInfo}
    <div class="match-actions">
      <a class="wa-btn" href="${waLink}" target="_blank" onclick="event.stopPropagation()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        Message on WhatsApp
      </a>
      ${isSeg ? `<button class="map-btn" onclick="${mapBtnFn}" title="View routes on map"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></button>` : ""}
    </div>`;
        return card;
      }

      function formatTime(t) {
        const [h, m] = t.split(":").map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
      }

      function filter(type, el) {
        document
          .querySelectorAll(".fchip")
          .forEach((c) => c.classList.remove("active"));
        el.classList.add("active");
        let f = allMatches;
        if (type === "segment")
          f = allMatches.filter((m) => m.match_type === "segment");
        if (type === "proximity")
          f = allMatches.filter((m) => m.match_type === "proximity");
        if (type === "driver")
          f = allMatches.filter(
            (m) => m.role === "driver" || m.role === "both",
          );
        if (type === "passenger")
          f = allMatches.filter(
            (m) => m.role === "passenger" || m.role === "both",
          );
        renderMatches(f);
      }

      function showOnMap(idx) {
        const segMatches = allMatches.filter((m) => m.match_type === "segment");
        const m = segMatches[idx];
        if (!m) return;

        document.getElementById("mm-title").textContent =
          `${m.shared_segments} shared segments with ${m.name.split(" ")[0]}`;

        const wrap = document.getElementById("modal-map-wrap");
        wrap.innerHTML = '<div id="modal-map"></div>';
        document.getElementById("map-modal").classList.add("show");

        setTimeout(() => {
          if (modalMap) {
            modalMap.remove();
            modalMap = null;
          }
          modalMap = L.map("modal-map");
          L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap",
            maxZoom: 19,
          }).addTo(modalMap);

          const layers = [];

          // Draw MY route — muted blue dashed
          if (m.my_path_geojson) {
            try {
              const myGeojson = JSON.parse(m.my_path_geojson);
              const myLayer = L.geoJSON(myGeojson, {
                style: {
                  color: "#3B82F6",
                  weight: 4,
                  opacity: 0.55,
                  dashArray: "6 4",
                },
              }).addTo(modalMap);
              layers.push(myLayer);
            } catch {}
          }

          // Draw THEIR route — vivid green solid
          if (m.their_path_geojson) {
            try {
              const theirGeojson = JSON.parse(m.their_path_geojson);
              const theirLayer = L.geoJSON(theirGeojson, {
                style: { color: "#00C060", weight: 5, opacity: 0.85 },
              }).addTo(modalMap);
              layers.push(theirLayer);
            } catch {}
          }

          // Fit map to show both routes
          if (layers.length) {
            try {
              const group = L.featureGroup(layers);
              modalMap.fitBounds(group.getBounds(), { padding: [28, 28] });
            } catch {
              modalMap.setView([24.86, 67.01], 13);
            }
          } else {
            modalMap.setView([24.86, 67.01], 13);
          }

          // Add a simple legend
          const legend = L.control({ position: "bottomleft" });
          legend.onAdd = () => {
            const d = L.DomUtil.create("div");
            d.style.cssText =
              "background:white;padding:8px 10px;border-radius:8px;font-size:11px;font-weight:600;line-height:1.8;box-shadow:0 2px 8px rgba(0,0,0,.12)";
            d.innerHTML = `<div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:3px;background:#3B82F6;opacity:.6;border-radius:1px"></div>My route</div><div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:3px;background:#00C060;border-radius:1px"></div>${m.name.split(" ")[0]}'s route</div>`;
            return d;
          };
          legend.addTo(modalMap);
        }, 100);
      }
      function handleModalBg(e) {
        if (e.target === document.getElementById("map-modal")) closeModal();
      }
      function closeModal() {
        document.getElementById("map-modal").classList.remove("show");
        if (modalMap) {
          modalMap.remove();
          modalMap = null;
        }
      }

      function shareApp() {
        const text = `I joined HamSafar — free carpooling for Karachi commuters! Save thousands on petrol.\n\n${window.location.origin}`;
        if (navigator.share) navigator.share({ title: "HamSafar", text });
        else
          navigator.clipboard
            .writeText(text)
            .then(() => toast("Link copied!", "success"));
      }

      let profileOpen = false;
      function toggleProfileModal() {
        profileOpen = !profileOpen;
        document
          .getElementById("profile-modal")
          .classList.toggle("show", profileOpen);
      }
      document.addEventListener("click", (e) => {
        if (
          profileOpen &&
          !e.target.closest("#profile-modal") &&
          !e.target.closest("#user-chip")
        ) {
          profileOpen = false;
          document.getElementById("profile-modal").classList.remove("show");
        }
      });
      function togglePwPanel() {
        document.getElementById("pw-panel").classList.toggle("show");
      }
      async function changePassword() {
        const pw = document.getElementById("new-pw").value;
        if (pw.length < 6) return toast("Minimum 6 characters", "warn");
        try {
          const res = await fetch(`${API}/api/auth/change-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ password: pw }),
          });
          if (!res.ok) throw new Error();
          document.getElementById("new-pw").value = "";
          document.getElementById("pw-panel").classList.remove("show");
          toast("Password updated", "success");
        } catch {
          toast("Could not update", "error");
        }
      }
      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }
      let _t;
      function toast(msg, type = "success") {
        const t = document.getElementById("toast");
        document.getElementById("toast-msg").textContent = msg;
        t.className = `show ${type}`;
        clearTimeout(_t);
        _t = setTimeout(() => (t.className = ""), 3500);
      }

      loadMatches();

      // ── FEEDBACK ──────────────────────────────────────────────────────────────
      let fbRating = 0;

      function openFeedback() {
        fbRating = 0;
        document.getElementById("fb-text").value = "";
        document.getElementById("fb-sub").textContent =
          "How well did HamSafar work for your commute?";
        document
          .querySelectorAll(".star")
          .forEach((s) => s.classList.remove("selected"));
        document.getElementById("fb-overlay").classList.add("show");
      }
      function closeFeedback() {
        document.getElementById("fb-overlay").classList.remove("show");
      }
      function handleFbBg(e) {
        if (e.target === document.getElementById("fb-overlay")) closeFeedback();
      }

      const ratingLabels = [
        "",
        "Not useful at all",
        "Needs improvement",
        "Getting there",
        "Really good",
        "Love it!",
      ];

      function setRating(v) {
        fbRating = v;
        document.querySelectorAll(".star").forEach((s) => {
          s.classList.toggle("selected", parseInt(s.dataset.v) <= v);
        });
        document.getElementById("fb-sub").textContent = ratingLabels[v];
      }

      async function submitFeedback() {
        if (!fbRating) return toast("Please select a star rating", "warn");
        const message = document.getElementById("fb-text").value.trim();
        const btn = document.getElementById("fb-submit");
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Sending...';
        try {
          const res = await fetch(`${API}/api/feedback`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              rating: fbRating,
              message,
              page: "matches",
            }),
          });
          if (!res.ok) throw new Error();
          closeFeedback();
          toast("Thank you! Your feedback helps a lot.", "success");
        } catch {
          toast("Could not send feedback", "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Send feedback";
        }
      }
    </script>

    <!-- FEEDBACK FAB -->
    <button class="feedback-fab" onclick="openFeedback()" title="Send feedback">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        />
        <line x1="9" y1="10" x2="15" y2="10" />
        <line x1="12" y1="7" x2="12" y2="13" />
      </svg>
    </button>

    <!-- FEEDBACK OVERLAY -->
    <div class="overlay" id="fb-overlay" onclick="handleFbBg(event)">
      <div class="overlay-box">
        <div class="overlay-handle"></div>
        <div class="overlay-title">Share your feedback</div>
        <div class="overlay-sub" id="fb-sub">
          How well did HamSafar work for your commute?
        </div>

        <!-- Star rating -->
        <div class="stars" id="stars">
          <button class="star" data-v="1" onclick="setRating(1)" title="Poor">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
          </button>
          <button class="star" data-v="2" onclick="setRating(2)" title="Fair">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
          </button>
          <button class="star" data-v="3" onclick="setRating(3)" title="Good">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
          </button>
          <button class="star" data-v="4" onclick="setRating(4)" title="Great">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
          </button>
          <button
            class="star"
            data-v="5"
            onclick="setRating(5)"
            title="Excellent"
          >
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
          </button>
        </div>

        <div class="input-wrap" style="margin-bottom: 16px">
          <textarea
            class="fb-textarea"
            id="fb-text"
            rows="3"
            placeholder="Tell us what's working, what's not, what you'd love to see..."
          ></textarea>
        </div>

        <div class="overlay-actions">
          <button class="btn" id="fb-submit" onclick="submitFeedback()">
            Send feedback
          </button>
          <button class="btn btn-ghost" onclick="closeFeedback()">
            Maybe later
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
